<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phòng Thí Nghiệm: Giao Thoa Sóng Cơ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="lab-header">
        <div class="lab-header-left">
            <a href="index.html" class="back-portal-btn">← Rời phòng thí nghiệm</a>
            <h2>Thí nghiệm: Giao Thoa Sóng Cơ</h2>
        </div>
        <div class="lab-status">● Trạng thái: Sẵn sàng tương tác</div>
    </header>

    <div class="lab-workspace">
        <iframe class="lab-iframe"
            loading="lazy"
            src="mo-phong-giao-thoa-song.html" 
            allowfullscreen="allowfullscreen"
            title="Mô phỏng Giao Thoa Sóng">
        </iframe>
    </div>

    <div id="ai-chat-widget">
        <button id="ai-chat-bubble" aria-label="Mở AI Chat">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
            </svg>
        </button>
        <div id="ai-chat-box">
            <div class="ai-chat-header">
                <h3>AI Trợ Giảng Vật Lý</h3>
                <button id="ai-chat-close-btn" aria-label="Đóng Chat">&times;</button>
            </div>
            <div id="chat-window" class="chat-messages-area">
                <p class="ai-message">Chào bạn! Mình là Trợ giảng AI. Bạn có thắc mắc gì về các vân cực đại, cực tiểu hay bước sóng trong bài Giao thoa sóng này không?</p>
            </div>
            
            <div id="chat-input-area">
                <input type="text" id="user-input" placeholder="Hỏi AI Trợ giảng...">
                <button id="mic-button" aria-label="Nói">🎙️</button>
                <button id="send-button" aria-label="Gửi">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18px" height="18px">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2 .01 7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div> 

    <script src="chat.js"></script>
</body>
</html>
