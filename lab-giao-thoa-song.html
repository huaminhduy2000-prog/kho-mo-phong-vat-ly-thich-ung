<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phòng Thí Nghiệm: Giao Thoa Sóng Cơ</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="m-0 p-0 h-screen w-screen overflow-hidden bg-[#f0f1f2] flex flex-col">

    <header class="h-14 bg-slate-900 flex items-center justify-between px-6 border-b border-slate-700 shrink-0 select-none" style="font-family: ui-sans-serif, system-ui, sans-serif;">
        <div class="flex items-center gap-4">
            <a href="index.html" class="flex items-center gap-1 text-slate-300 hover:text-white border border-slate-600 hover:border-slate-400 px-3 py-1.5 rounded-lg text-xs font-bold transition-all no-underline bg-slate-800/50">
                ← RỜI PHÒNG THÍ NGHIỆM
            </a>
            <div class="w-px h-5 bg-slate-700"></div>
            <h1 class="text-white font-bold text-base tracking-tight">Thí nghiệm: Giao Thoa Sóng Cơ Học</h1>
        </div>
        <div class="flex gap-4">
            <div class="bg-slate-800 px-3 py-1 rounded text-xs font-mono text-slate-400 border border-slate-700 select-none uppercase">v1.0.0-AI-Studio</div>
        </div>
    </header>

    <div id="root" class="flex-1 min-h-0"></div>

    <div id="ai-chat-widget">
        <button id="ai-chat-bubble" aria-label="Mở AI Chat">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        </button>
        <div id="ai-chat-box">
            <div class="ai-chat-header"><h3>AI Trợ Giảng Vật Lý</h3><button id="ai-chat-close-btn" aria-label="Đóng Chat">&times;</button></div>
            <div id="chat-window" class="chat-messages-area"><p class="ai-message">Chào bạn! Mình là Trợ giảng AI. Bạn có thắc mắc gì về các hiện tượng giao thoa, gợn sóng cực đại và cực tiểu trong thí nghiệm này không?</p></div>
            <div id="chat-input-area">
                <input type="text" id="user-input" placeholder="Hỏi AI Trợ giảng...">
                <button id="mic-button" aria-label="Nói">🎙️</button>
                <button id="send-button" aria-label="Gửi"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18px" height="18px"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2 .01 7z"/></svg></button>
            </div>
        </div>
    </div>
