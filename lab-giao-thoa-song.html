precision highp float;

uniform vec2 u_s1Intervals[4];
uniform vec2 u_s2Intervals[4];

// Returns distance with a small offset to prevent singularity
float safeDist(vec2 p1, vec2 p2) {
    return distance(p1, p2) + 0.05;
}

// Compute wave amplitude from a point source radially based on intervals
float waveSource(vec2 pos, vec2 source, float k, float w, bool isSource1) {
    float r = safeDist(pos, source);
    float speed = w / k;
    float amp = 0.0;
    
    // We can't pass arrays as function arguments easily in GLSL 1.0, 
    // so we branch based on the flag
    for (int i = 0; i < 4; i++) {
        vec2 interval = isSource1 ? u_s1Intervals[i] : u_s2Intervals[i];
        float startTime = interval.x;
        float endTime = interval.y;
        
        if (startTime < 0.0) continue;
        
        float r_out = speed * max(0.0, u_time - startTime);
        
        // Single pulse check: if it's very short, use gaussian envelope
        // Otherwise, continuous wave envelope
        float r_in;
        float env = 1.0;
        
        if (endTime < 0.0) {
            // Still active, wave propagates from r=0 to r_out
            env = smoothstep(r_out + 0.05, r_out, r);
        } else {
            // Turned off, wave is an expanding ring
            r_in = speed * max(0.0, u_time - endTime);
            
            // Check if pulse duration is very short (pulse mode)
            if (endTime - startTime < 1.0) {
                 float pulseCenter = (r_out + r_in) * 0.5;
                 env = exp(-pow(r - pulseCenter, 2.0) * 100.0) * smoothstep(speed*0.1, speed*0.15, r_out);
            } else {
                 env = smoothstep(r_out + 0.05, r_out, r) * smoothstep(r_in - 0.05, r_in, r);
            }
        }

    }
    
    return amp;

    float normAmp = clamp((amp + 1.0) * 0.5, 0.0, 1.0);

    } else if (u_waveType == 1) {
